<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Admin Login | Cultural Heritage AR</title>
  <link rel="stylesheet" href="./login.css">
</head>
<body>

  <div class="login-container">
    <div class="login-box">
      <h2>Admin Login</h2>

      <input
        type="email"
        id="email"
        placeholder="Admin Email"
        required
      >

      <input
        type="password"
        id="password"
        placeholder="Password"
        required
      >

      <button id="loginBtn">Login</button>

      <p>
        First time admin?
        <a href="register.html">Register here</a>
      </p>
    </div>
  </div>

  <script type="module" src="/login.js"></script>
</body>
</html>
